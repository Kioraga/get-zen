<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1c1c2e"/>
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#7c3aed" stroke-width="6"/>
  <!-- Z letter -->
